<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SW Coast Path</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/tachyons@4.12.0/css/tachyons.min.css" />
  <!-- Bump ?v= on every deploy so browsers fetch fresh JS/CSS instead of stale cached copies -->
  <link rel="stylesheet" href="styles.css?v=20260701-1" />

  <link rel="shortcut icon" href="favicon.ico">
</head>

<body class="baskerville">
  <div id="app" class="layout">
    <!-- closed by default on mobile so it doesn’t cover too much -->
    <aside id="sidebar" class="sidebar">
      <header class="sidebar-header">
        <h1 class="fw1 ma0">🗺️ SW Coast Path</h1>
        <p class="mt2 mb3 lh-copy">
          Progress in our multi-year project to walk the <i>South West Coast Path</i> (~630 miles).
          <a href="https://www.youtube.com/@candovlogs" target="_blank" rel="noopener">YouTube channel</a>.
        </p>

        <!-- Walkers: centered, larger, images + progress pies -->
        <div id="walkers-avatars" class="walkers-avatars"></div>

        <!-- compact KPIs -->
        <div id="overall-stats" class="overall-stats"></div>

        <!-- shows when a single walker is pinned -->
        <div id="active-filter" class="active-filter" hidden></div>
      </header>

      <!-- Single merged panel -->
      <section class="tab-panel active">
        <div class="filters">
          <label class="filter-item">
            <input id="filter-videos" type="checkbox" />
            <span class="ml1" id="video-toggle-label">Videos only</span>
          </label>
          <label class="filter-item sort-control">
            <span class="mr1">Sort</span>
            <select id="sort-mode">
              <option value="trip">By trip</option>
              <option value="recent">Most recent</option>
            </select>
          </label>
          <span class="silver f6" id="sections-count"></span>
        </div>
        <div id="sections-list" class="sections-list"></div>
      </section>
    </aside>

    <div id="map" class="map"></div>
    <button id="open-sidebar" class="open-sidebar" aria-label="Toggle details">ⓘ</button>

    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script defer src="leaflet-corridor.js?v=20260701-1"></script>
    <script defer src="data.js?v=20260701-1"></script>
    <script defer src="index.js?v=20260701-1"></script>
  </div>
</body>
</html>
